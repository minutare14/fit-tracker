services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:${BACKEND_HOST_PORT:-8000}}
    restart: unless-stopped
    ports:
      - "${APP_HOST_PORT:-3020}:${APP_INTERNAL_PORT:-3000}"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:${BACKEND_HOST_PORT:-8000}}
      API_BASE_URL_SERVER: ${APP_API_BASE_URL_SERVER:-http://backend:8000}
      PORT: ${APP_INTERNAL_PORT:-3000}
      HOSTNAME: 0.0.0.0
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    environment:
      DATABASE_URL: ${BACKEND_DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-fittracker}@db:5432/${POSTGRES_DB:-fit_tracker}}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://127.0.0.1:${APP_HOST_PORT:-3020},http://localhost:${APP_HOST_PORT:-3020}}
      HEVY_API_BASE_URL: ${HEVY_API_BASE_URL:-https://api.hevyapp.com/v1}
      HEVY_API_KEY: ${HEVY_API_KEY:-}
      HEVY_SYNC_PAGE_SIZE: ${HEVY_SYNC_PAGE_SIZE:-20}
      HEALTH_AUTO_EXPORT_SECRET: ${HEALTH_AUTO_EXPORT_SECRET:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/api/health\")'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fittracker}
      POSTGRES_DB: ${POSTGRES_DB:-fit_tracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fit_tracker}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
