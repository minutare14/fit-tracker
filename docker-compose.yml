services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
        API_PROXY_TARGET: ${API_PROXY_TARGET:-http://backend:8000}
    container_name: fit-tracker-app
    restart: unless-stopped
    ports:
      - "${APP_HOST_PORT:?APP_HOST_PORT must be set}:${APP_INTERNAL_PORT:-3000}"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-fit_tracker}?schema=public}
      HEVY_API_KEY: ${HEVY_API_KEY:-}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://backend:8000}
      PORT: ${APP_INTERNAL_PORT:-3000}
      HOSTNAME: 0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:${APP_INTERNAL_PORT:-3000} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - default
      - dokploy-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fit-tracker-backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-fit_tracker}?schema=public}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-fit_tracker}?schema=public}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,https://fit.minutarecore.space,https://api.fit.minutarecore.space}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/api/health/db\")'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - default
      - dokploy-network

  db:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    container_name: fit-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-fit_tracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=${POSTGRES_PASSWORD:-postgres} psql -h 127.0.0.1 -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fit_tracker} -c 'SELECT 1' >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - default

volumes:
  postgres_data:

networks:
  dokploy-network:
    external: true
