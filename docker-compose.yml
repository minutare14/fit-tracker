services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    container_name: fit-tracker-app
    restart: unless-stopped
    ports:
      - "${APP_HOST_PORT:?APP_HOST_PORT must be set}:${APP_INTERNAL_PORT:-3000}"
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      HEVY_API_KEY: ${HEVY_API_KEY:-}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
      PORT: ${APP_INTERNAL_PORT:-3000}
      HOSTNAME: 0.0.0.0
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:${APP_INTERNAL_PORT:-3000} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - default
      - dokploy-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fit-tracker-backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/api/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - default
      - dokploy-network

  db:
    image: postgres:16-alpine
    container_name: fit-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-fit_tracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

volumes:
  postgres_data:

networks:
  dokploy-network:
    external: true
